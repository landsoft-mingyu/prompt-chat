services:
  cubrid:
    image: cubrid/cubrid:latest
    container_name: prompt_chat_cubrid
    hostname: cubrid
    environment:
      - CUBRID_DB=royal
      - CUBRID_USER=royal
      - CUBRID_PASSWORD=change-me
    ports:
      - "33000:33000"
    volumes:
      - cubrid_data:/var/lib/cubrid
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - prompt_chat_net
    cap_add:
      - SYS_ADMIN
    ipc: host

  gateway:
    image: nginx:1.27
    container_name: prompt_chat_gateway
    ports:
      - "3001:80"
    volumes:
      - /data/prompt_chat/gateway/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /data/prompt_chat/gateway/html:/usr/share/nginx/html:ro
    depends_on:
      - api
    networks:
      - prompt_chat_net

  api:
    image: landsoftdocker/prompt-chat-api:0.1.2
    container_name: prompt_chat_api
    expose:
      - "8000"
    env_file:
      - .env
    volumes:
      - ./backend/app:/app/app
    networks:
      - prompt_chat_net

networks:
  prompt_chat_net:
    driver: bridge

volumes:
  cubrid_data:
